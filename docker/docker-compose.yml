version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-unifiedai}
      POSTGRES_USER:     ${POSTGRES_USER:-uap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: uap_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-uap}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-unifiedai}
      REDIS_URL:         redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET:        ${JWT_SECRET:-supersecretkey}
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-http://localhost:3000}
      STORAGE_PATH:      /app/data_sessions
      OUTPUT_PATH:       /app/outputs
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
      MAX_FILE_SIZE_MB:  ${MAX_FILE_SIZE_MB:-200}
    volumes:
      - backend_data:/app/data_sessions
      - backend_outputs:/app/outputs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: uap_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_outputs:
